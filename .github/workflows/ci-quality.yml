name: CI Quality Gate

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "*.md"

concurrency:
  group: ci-quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint + Coverage Gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci

      - name: Install backend Python dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Typecheck
        run: npm run lint

      - name: Data quality baseline (warn-only)
        run: npm run db:data-quality:gate:warn | tee data-quality-baseline.txt

      - name: Upload data quality baseline (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: data-quality-baseline
          path: data-quality-baseline.txt
          if-no-files-found: ignore

      - name: Backend FastAPI tests
        env:
          PYTHON_BIN: python
        run: npm run test:py

      - name: Coverage quality gate
        run: npm run test:coverage:check

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: npm ci

      - name: Install backend Python dependencies
        run: python -m pip install -r backend/requirements.txt

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E
        run: npm run test:e2e

      - name: Upload Playwright test results (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: test-results/
          if-no-files-found: ignore

      - name: Upload Playwright report (always)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

  oracle-smoke:
    name: Oracle Health Smoke
    runs-on: ubuntu-latest
    needs: quality
    env:
      APP_ENV: hml
      PORT: 4001
      DB_DIALECT: oracle
      ALLOW_ORACLE_SEED_FALLBACK: "false"
      ENABLE_DEMO_AUTH: "true"
      AUTH_PROVIDER: local_jwt
      AUTH_PASSWORD_LOGIN_ENABLED: "true"
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      ORACLE_USER: ${{ secrets.ORACLE_USER }}
      ORACLE_PASSWORD: ${{ secrets.ORACLE_PASSWORD }}
      ORACLE_CONNECT_STRING: ${{ secrets.ORACLE_CONNECT_STRING }}
    steps:
      - name: Check Oracle secrets
        id: gate
        run: |
          if [ -z "${ORACLE_USER}" ] || [ -z "${ORACLE_PASSWORD}" ] || [ -z "${ORACLE_CONNECT_STRING}" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "Oracle secrets missing; skipping oracle-smoke job steps."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.gate.outputs.run == 'true'
        uses: actions/checkout@v4

      - name: Setup Node
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Setup Python
        if: steps.gate.outputs.run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        if: steps.gate.outputs.run == 'true'
        run: npm ci

      - name: Install backend Python dependencies
        if: steps.gate.outputs.run == 'true'
        run: python -m pip install -r backend/requirements.txt

      - name: Start API (oracle)
        if: steps.gate.outputs.run == 'true'
        env:
          PYTHON_BIN: python
        run: nohup npm run api:start:oracle > oracle-api.log 2>&1 &

      - name: Wait and validate Oracle health
        if: steps.gate.outputs.run == 'true'
        run: |
          for i in {1..30}; do
            if curl -sSf http://localhost:4001/api/health > health.json; then
              break
            fi
            sleep 2
          done
          cat health.json
          grep -q '"dialect":"oracle"' health.json
          grep -q '"dbStatus":"oracle_pool_ok"' health.json
